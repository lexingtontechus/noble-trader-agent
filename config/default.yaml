environment: development
log_level: INFO
portfolio:
  target_allocation:
    crypto: 0.7
    equities: 0.15
    commodities: 0.0
    forex: 0.15
  rebalance_threshold_drift_pct: 0.1
  rebalance_frequency: on_drift
  rebalance_method: threshold
  start_smart: true
  # Initial symbols — start SMALL. These seed the symbols table (db/symbol_registry).
  # Keep this list aligned with the venues' crypto_pairs below (alpaca.crypto_pairs
  # and hyperliquid perps). Add symbols here as you graduate them from shadow mode.
  initial_symbols:
  - symbol: BTC/USD
    venue: alpaca
    asset_class: crypto
  - symbol: BTC-PERP
    venue: hyperliquid
    asset_class: crypto
  - symbol: ETH-PERP
    venue: hyperliquid
    asset_class: crypto
venues:
  alpaca:
    enabled: false   # DEPRECATED — brokerage is now the MT4/MT5 bridge (see mt4_mt5). Kept for reference/compat.
    asset_classes:
    - crypto
    - equities
    - commodities
    credentials:
      api_key: secret:alpaca.api_key
      api_secret: secret:alpaca.api_secret
      base_url: secret:alpaca.base_url
      data_url: secret:alpaca.data_url
    rate_limit_per_min: 200
    data_modes:
      live: true
      historical: true
    features:
      forex: false
      options: false
      shorting: true
      leverage: 4.0
      crypto_24_7: true
      crypto_pairs:
      - BTC/USD
      - SOL/USD
      - ETH/USD
      - LTC/USD
      - BCH/USD
  hyperliquid:
    enabled: false   # DEPRECATED — brokerage is now the MT4/MT5 bridge (see mt4_mt5). Kept for reference/compat.
    asset_classes:
    - crypto
    credentials:
      wallet_address: secret:hyperliquid.wallet_address
      private_key: secret:hyperliquid.private_key
      api_url: secret:hyperliquid.api_url
      vault_address: secret:hyperliquid.vault_address
    rate_limit_per_min: 1200
    data_modes:
      live: true
      historical: true
    features:
      perps: true
      spot: true
      funding: true
      post_only: true
      reduce_only: true
      max_leverage: 5.0
  mt4_mt5:
    enabled: true    # PRIMARY brokerage venue — EA/MT5 -> bridge_relay.py -> Hermes.
    asset_classes:
    - crypto
    - forex
    - equities
    - commodities
    credentials:
      bridge_token: secret:mt4_mt5_bridge_token
      source_id: secret:mt4_mt5_source_id
      relay_url: secret:mt4_mt5_relay_url
    rate_limit_per_min: 600
    data_modes:
      live: true
      historical: true
    features:
      ea_signals: true
      venue_agnostic: true
      symbol_qualifier: true   # EA symbols are auto-qualified (e.g. COINBASE:BTCUSD)
      supported_exchanges:
      - COINBASE
      - BINANCE
      - MT4
      - MT5
  tradingview:
    enabled: true
    asset_classes:
    - crypto
    - forex
    - equities
    - commodities
    credentials:
      api_key: secret:tradingview.api_key
    rate_limit_per_min: 300
    data_modes:
      live: true
      historical: true
    features:
      venue_agnostic: true
      source: tradingviewapi_com
      api_url: https://tradingview-data1.p.rapidapi.com
      api_host: tradingview-data1.p.rapidapi.com
      # Real-time streaming (Ultra/Mega plans). When true the adapter opens a
      # single persistent WebSocket (wss://ws.tradingviewapi.com/ws?token=KEY)
      # and pushes quotes — zero REST budget burned. Falls back to REST polling
      # if the WS is unavailable or the plan has no WS entitlement.
      use_websocket: true
      ws_url: wss://ws.tradingviewapi.com/ws?token={token}
      poll_interval_sec: 5
      max_retries: 3
      # --- WS plan + scheduling (signal-gated by default; no user setup needed) ---
      # ws_plan is a SILENT default — the user does not configure it. It pairs the
      # WS entitlement/cooldown with the TradingViewAPI plan:
      #   ultra -> 6 WS-hours/day, mega -> 24 WS-hours/day, none -> REST-only.
      # The adapter tracks WS-seconds-used-per-local-day and self-disables WS once
      # the plan's daily budget is spent, reverting to rest_fallback_interval_sec.
      ws_plan: ultra
      # ws_mode: how WS is activated.
      #   on_demand -> WS opens only while >=1 symbol is in an ACTIVE urgency tier
      #                (triggered by a trade=true signal) and closes after
      #                active_ws_ttl_sec (the "cooldown"). Respects the daily budget.
      #                This is the silent default and keeps Ultra sufficient.
      #   always    -> WS stays open 24/7 (only sane on mega; ultra hits its 6h cap).
      #   scheduled -> WS open only during ws_schedule window (timezone-aware).
      ws_mode: on_demand
      # ws_schedule: when ws_mode=scheduled. Defaults to reusing the existing
      # active_hours block (same timezone as the user's locale) so no extra config
      # is required. Override with an explicit "HH:MM-HH:MM" in that timezone.
      ws_schedule: use_active_hours
      # Cost floor when WS is off (no entitlement / budget spent / outside window):
      # the IDLE poll interval. 60s keeps indicators warm at minimal REST cost.
      rest_fallback_interval_sec: 60
      # How long WS stays open per ACTIVE signal before the "cooldown" reverts to
      # REST. This is the lever that pairs urgency with the plan's daily WS budget.
      active_ws_ttl_sec: 300
upstream:
  noble_trader:
    redis:
      url: secret:noble_trader.redis_url
      channel: signal.raw.noble_trader
      consumer_group: hermes-l0
      staleness_ms: 30000
    supabase:
      url: secret:supabase.url
      anon_key: secret:supabase.anon_key
      sweep_result_table: nt_sweep_result
      regime_log_table: nt_regime_log
      backfill_on_startup: true
      backfill_lookback_days: 365
data_sources:
  policy: venue_native_only
  prohibited_sources:
  - yfinance
  - alpha_vantage
  - iex
  - any_third_party_price_feed
  allowed_sources:
  - tradingviewapi_com
  fallback_behavior: fail_hard
account:
  max_portfolio_drawdown_pct: 0.15
  daily_loss_limit_pct: 0.03
  weekly_loss_limit_pct: 0.06
  max_leverage_total: 3.0
  max_gross_exposure_pct: 1.5
  max_net_exposure_pct: 0.5
  margin_usage_limit_pct: 0.7
  min_cash_buffer_pct: 0.05
asset:
  max_position_size_pct: 0.05
  max_position_notional: 25000
  max_asset_drawdown_pct: 0.08
  max_concentration_pct: 0.15
  sector_exposure_cap: 0.4
  venue_exposure_cap: 0.6
signal:
  staleness_ms: 30000
  min_edge_estimate_bps: 5
  reward_risk_min: 1.5
  regime_filter_allowlist: all_states
  tail_risk_action_override: more_conservative
entry:
  strategies:
    calm_trend: enter_now
    choppy_range: wait_for_brick_close
    high_vol_breakout: wait_for_pullback
    regime_transition: wait_for_retest
    risk_off: block
    funding_stress: block
    liquidity_drained: maker_only
  brick_confirmation_count: 2
  pullback_depth_brick_fraction: 0.5
  signal_expiry_minutes: 30
execution:
  default_method: limit_at_brick
  large_size_threshold_usd: 10000
  twap_n_bricks: 3
  iceberg_child_pct: 10
  limit_offset_bps: 0
  post_only_preference: true
  max_slippage_bps: 20
position_management:
  trailing:
    method: brick_boundary
    atr_mult: 3.0
    brick_count: 1
  exit:
    strategy: at_tp
    brick_momentum_threshold: 0.5
  regime_exit:
    trigger_states:
    - risk_off
    - funding_stress
circuit_breakers:
  volatility:
    atr_baseline_lookback_days: 20
    atr_current_window_minutes: 60
    vol_mult_threshold: 2.5
    k_constant: 0.3
    action_ladder:
      level_1: reduce_size_50pct
      level_2: block_new_entries
      level_3: tighten_stops
      level_4: liquidate
  risk:
    checks:
      account_allocation: true
      risk_fraction: true
      risk_amount: true
      reward_risk: true
    var_confidence: 0.99
    var_window_days: 1
  kill_switch:
    auto_triggers:
      daily_loss_hit: true
      venue_disconnect_sec: 60
      audit_log_failure: true
  manager:
    portfolio_exposure:
      enabled: true
      description: Gross exposure as % of equity
      tiers:
      - threshold: 0.8
        action: reduce_25pct
        label: 80% exposure
        cooldown_sec: 0
      - threshold: 0.9
        action: reduce_50pct
        label: 90% exposure
        cooldown_sec: 0
      - threshold: 1.0
        action: block_entries
        label: 100% exposure (max)
        cooldown_sec: 0
      - threshold: 1.5
        action: halt_all
        label: 150% exposure (over-leveraged)
        cooldown_sec: 3600
    position_size:
      enabled: true
      description: Absolute $ notional per position
      tiers:
      - threshold: 50000
        action: reduce_25pct
        label: $50k position
        cooldown_sec: 0
      - threshold: 75000
        action: reduce_50pct
        label: $75k position
        cooldown_sec: 0
      - threshold: 100000
        action: block_entries
        label: $100k position (max)
        cooldown_sec: 0
    daily_loss:
      enabled: true
      description: Absolute $ daily loss
      tiers:
      - threshold: 5000
        action: reduce_50pct
        label: $5k daily loss
        cooldown_sec: 0
      - threshold: 10000
        action: block_entries
        label: $10k daily loss
        cooldown_sec: 14400
      - threshold: 15000
        action: halt_all
        label: $15k daily loss (critical)
        cooldown_sec: 86400
    var:
      enabled: true
      description: Absolute $ VaR (1-day, 99% confidence)
      tiers:
      - threshold: 50000
        action: reduce_50pct
        label: $50k VaR
        cooldown_sec: 0
      - threshold: 100000
        action: block_entries
        label: $100k VaR
        cooldown_sec: 3600
    drawdown:
      enabled: true
      description: Portfolio drawdown % from peak equity
      tiers:
      - threshold: 0.15
        action: reduce_50pct
        label: 15% drawdown
        cooldown_sec: 0
      - threshold: 0.2
        action: block_entries
        label: 20% drawdown
        cooldown_sec: 14400
      - threshold: 0.25
        action: liquidate
        label: 25% drawdown (critical)
        cooldown_sec: 86400
    funding_rate:
      enabled: true
      description: Daily funding cost in $ for crypto perps
      tiers:
      - threshold: 50
        action: temp_block
        label: $50/day funding
        cooldown_sec: 1800
      - threshold: 200
        action: block_entries
        label: $200/day funding (extreme)
        cooldown_sec: 7200
    consecutive_losses:
      enabled: true
      description: 'Rolling 24h: consecutive losing trades'
      tiers:
      - threshold: 3
        action: reduce_50pct
        label: 3 consecutive losses
        cooldown_sec: 0
      - threshold: 5
        action: block_entries
        label: 5 consecutive losses
        cooldown_sec: 3600
    daily_wins:
      enabled: true
      description: 'Win-streak cooloff: wins_today / avg_daily_wins ratio'
      win_lookback_days: 30
      min_history: 5
      tiers:
      - threshold: 1.5
        action: reduce_50pct
        label: Win streak 150% of avg (trim size)
        cooldown_sec: 0
      - threshold: 2.0
        action: block_entries
        label: Win streak 200% of avg (cooloff halt)
        cooldown_sec: 14400
      - threshold: 3.0
        action: halt_all
        label: Win streak 300% of avg (session halt)
        cooldown_sec: 28800
    daily_profit:
      enabled: true
      description: Daily realized-profit cooloff (ride-and-exit halt)
      tiers:
      - threshold: 3000
        action: reduce_50pct
        label: $3k daily profit (trim size)
        cooldown_sec: 0
      - threshold: 5000
        action: block_entries
        label: $5k daily profit (cooloff halt, ~4.6% of ~$108k equity)
        cooldown_sec: 14400
      - threshold: 8000
        action: halt_all
        label: $8k daily profit (session halt, ~7.4% of equity)
        cooldown_sec: 28800
    trip_frequency:
      enabled: true
      description: 'Rolling 24h: number of CB trips'
      tiers:
      - threshold: 5
        action: reduce_50pct
        label: 5 trips in 24h
        cooldown_sec: 0
      - threshold: 10
        action: halt_all
        label: 10 trips in 24h (system unstable)
        cooldown_sec: 86400
autonomy:
  tier_0:
    approval: none
    actions:
    - query_duckdb
    - run_backtest
    - generate_report
    - run_optimization
  tier_1:
    approval: none
    max_notional_usd: 2000
    max_position_pct_of_equity: 0.015
    requires_shadow_days: 7
    requires_rigor_pass: 8
    actions:
    - enter_trade
    - close_trade
    - adjust_stop
  tier_2:
    approval: notify_only
    max_size_change_pct: 50
    requires_shadow_sharpe_pct: 80
    notify_channels:
    - discord
    - email
    review_window_hours: 24
    actions:
    - promote_config
    config_keys:
    - signal.staleness_ms
    - signal.min_edge_estimate_bps
    - execution.limit_offset_bps
    - execution.max_slippage_bps
    - execution.twap_n_bricks
    - execution.iceberg_child_pct
    - entry.brick_confirmation_count
    - entry.pullback_depth_brick_fraction
    - entry.signal_expiry_minutes
    - position_management.exit.brick_momentum_threshold
    - position_management.trailing.atr_mult
    - position_management.trailing.brick_count
    - renko.rolling_window_bricks
  tier_3:
    approval: required
    max_notional_usd: 25000
    or_novel_strategy: true
    approval_decision_ttl_sec: 300   # decision deadline: user must approve within 5 min
    on_timeout: skip
    actions:
    - enter_large_trade
    - novel_strategy
    config_keys:
    - circuit_breakers.volatility.vol_mult_threshold
    - circuit_breakers.volatility.atr_baseline_lookback_days
    - circuit_breakers.risk.var_confidence
    - account.max_portfolio_drawdown_pct
    - account.daily_loss_limit_pct
    - account.weekly_loss_limit_pct
    - meta_regime.hmm_n_components
    - meta_regime.confidence_floor
  tier_4:
    approval: human_only
    blocks:
    - changing_meta_regime_hmm_state_count
    - disabling_circuit_breakers
    - increasing_max_gross_exposure_beyond_2
    - promoting_failed_rigor_config
    - trading_in_blocked_regimes
    actions:
    - structural_change
    config_keys:
    - circuit_breakers.kill_switch.auto_triggers
    - circuit_breakers.enabled
    - account.max_gross_exposure_pct
    - account.max_leverage_total
    - asset.max_position_notional
    - autonomy.tier_1.max_notional_usd
    - autonomy.tier_3.max_notional_usd
    - venues.alpaca.enabled
    - venues.hyperliquid.enabled
  active_hours:
    # User locale / timezone for scheduling (stock sessions) + WS windows.
    # All schedule math (autonomy, TradingView WS) binds to THIS tz.
    timezone: America/Los_Angeles
    start: 09:30
    end: '16:00'
    crypto_24_7: true
    degrade_outside_hours: true
  # Cold-start guard: tighter caps for users with no proven track record.
  # Auto-exits when both exit conditions are met (count + positive expectancy).
  cold_start:
    enabled: true
    tier1_max_notional: 100          # vs tier_1.max_notional_usd = 5000
    tier1_max_position_pct: 0.002     # vs tier_1.max_position_pct_of_equity = 0.02
    max_new_positions: 3              # hard cap on concurrent NEW positions
    max_new_exposure_pct: 0.05        # total new exposure <= 5% of equity
    exit_after_n_trades: 20           # leave cold-start after N closed trades
    exit_min_expectancy_bps: 0        # AND realized expectancy > 0 (positive)
portfolio:
  # L4.5 selection layer: ranks candidate signals per cycle, admits top-N.
  # Excess candidates are DROPPED (not re-queued) — over-trading is a risk.
  selection:
    enabled: true
    max_new_positions_per_cycle: 3
    cycle_window_sec: 300             # candidates arriving within this window compete
    policy: top_n                     # top_n | score_threshold
    score_threshold: 0.0              # used when policy=score_threshold
    score_weights:
      pattern_confidence: 0.30
      expected_entry_alpha_bps: 0.25
      reward_risk: 0.20
      regime_alignment: 0.15
      diversification: 0.10
    max_correlated_exposure: 0.20     # cap on same-sector/exchange exposure
meta_regime:
  # Hidden-Markov regime model that labels market state (bull/bear/risk-off/...)
  # from multi-source features. Drives the regime_filter + regime_exit logic.
  hmm_n_components: 7          # number of latent market regimes the HMM discovers
  retrain_frequency_days: 30   # how often the HMM is retrained on fresh features
  confidence_floor: 0.55       # min posterior prob before a regime is "trusted"
  thresholds:
    risk_off_corr_threshold: 0.75        # cross-asset correlation above this => risk_off
    funding_stress_annualized_pct: 50.0  # annualized funding > this => funding_stress
    liquidity_depth_percentile: 10       # order-book depth below 10th pct => stress
    transition_entropy_bits: 1.5         # regime-transition uncertainty cap (bits)
renko:
  # Renko brick size is simulated, not fixed. The stack tests several multipliers
  # of a base brick and picks the one with best signal/risk on recent data.
  rolling_window_bricks: 500    # bricks of history used to (re)estimate the base brick
  simulation_multipliers:       # brick-size candidates = base * multiplier
  - 0.5
  - 0.75
  - 1.0
  - 1.25
  - 1.5
duckdb:
  path: secret:hermes.duckdb_path
  backup:
    daily: true
    backup_dir: ./backups
    retention_days: 30
  compaction:
    weekly_vacuum: true
    day_of_week: sunday
hermes_redis:
  url: secret:hermes.redis_url
auth:
  admin_username: secret:hermes.admin_username
  admin_password: secret:hermes.admin_password
  session_secret: secret:hermes.session_secret
  agent_token: secret:hermes.agent_token
  session_max_age_sec: 86400
  enabled: true
notifications:
  discord:
    webhook_url: secret:discord.webhook_url
    enabled: false
  telegram:
    bot_token: secret:telegram.bot_token
    chat_id: secret:telegram.chat_id
    enabled: false
logging:
  level: INFO
  format: json
  output: stdout
  file_path: ./logs/hermes.log
  rotate_max_mb: 100
  rotate_backup_count: 5
